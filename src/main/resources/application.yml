server:
  port: 8030
  tomcat:
    max-threads: 200
    min-spare-threads: 10
spring:
  application:
    name: census31-fwmt-outcome-service
  security:
    user:
      name: "user"
      password: "password"
  datasource:
    url: jdbc:postgresql://localhost/postgres?currentSchema=fwmtg
    driver-class-name: org.postgresql.Driver
    schema: classpath:/schema.sql
    continue-on-error: false
    username: postgres
    password: postgres
    initialization-mode: always
  cloud:
    gcp:
      project-id: ${FWMT_PUBSUB_PROJECT:fwmt-local}
      credentials:
        enabled: false
      firestore:
        enabled: false
      pubsub:
        enabled: true
        emulator-host: ${PUBSUB_EMULATOR_HOST:localhost:8085}

management:
  # Place /info and /health in the root
  endpoints.web.base-path: ''
  endpoint:
    health:
      show-details: always

logging:
  profile: DEV
  level:
    root: WARN
    uk.gov.ons.census.fwmt: INFO
    org.springframework.security: INFO
    org.springframework.web: INFO
    org.hibernate: INFO
    org.apache.commons.dbcp2: INFO
    org.springframework: INFO

redis:
  host: "localhost"
  port: 6379
  password: "password"
  database: 1

outcomeservice:
  outcomeCodeLookup:
    path: classpath:/outcomeCodeLookup.txt
  reasonCodeLookup:
    path: classpath:/reasonCodeLookup.txt
  questionnaireTypeLookup:
    path: classpath:/questionnaireTypeLookup.txt
  processorsleep:
    milliseconds: 200
  refusalEncryptionCodeLookup:
    path: classpath:/refusalEncryptionCodeLookup.txt
  pgp:
    fwmtPublicKey: "classpath:/testPublicKey.public"
    midlPublicKey: "classpath:/testSecondaryPublicKey.public"
    directory: "file://${home}/acceptance/data/"



app:
  testing: false
  messaging:
    provider: pubsub
    maxRetryCount: 5
    destinations:
      outcomePreprocessing: "Outcome.Preprocessing"
      outcomePreprocessingDlq: "Outcome.PreprocessingDLQ"
    subscriptions:
      outcomePreprocessingDlq: outcome-service-Outcome-PreprocessingDLQ
    pubsub:
      outcome-preprocessing-subscription: outcome-service-Outcome-Preprocessing
